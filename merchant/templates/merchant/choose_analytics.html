<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose Analytics — Merchant Services</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
  body {
    min-height: 100vh;
    background: linear-gradient(160deg,#0d1b2a 0%,#1b2838 50%,#0f3460 100%);
    display: flex; align-items: center; justify-content: center;
    color: #e0e8f0;
  }
  .choose-card {
    background: rgba(26,58,92,0.9);
    border: 1px solid rgba(100,180,255,0.2);
    border-radius: 20px;
    padding: 2.5rem 2rem;
    max-width: 780px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .brand-title { color: #FFD700; font-size: 1.5rem; font-weight: 800; }
  .alert-success { background: rgba(25,135,84,.2); border-color: rgba(25,135,84,.4); color: #7fffd4; }

  .option-card {
    display: block;
    background: rgba(255,255,255,0.04);
    border: 2px solid rgba(100,180,255,0.2);
    border-radius: 16px;
    padding: 2rem 1.5rem;
    text-decoration: none;
    color: #e0e8f0;
    transition: border-color .2s, background .2s, transform .15s;
    height: 100%;
  }
  .option-card:hover {
    border-color: #FFD700;
    background: rgba(255,215,0,0.06);
    color: #fff;
    transform: translateY(-3px);
    text-decoration: none;
  }
  .option-card .icon {
    font-size: 2.8rem;
    color: #FFD700;
    margin-bottom: 1rem;
  }
  .option-card h4 {
    color: #e8f4fd;
    font-weight: 800;
    font-size: 1.15rem;
    margin-bottom: .6rem;
  }
  .option-card p {
    color: #a8d8f0;
    font-size: .88rem;
    margin: 0;
    line-height: 1.6;
  }
  .option-card .badge-tag {
    display: inline-block;
    background: rgba(100,180,255,0.15);
    border: 1px solid rgba(100,180,255,0.3);
    border-radius: 6px;
    font-size: .75rem;
    color: #a8d8f0;
    padding: .15rem .5rem;
    margin-bottom: .75rem;
  }
  .back-link { color: #a8d8f0; font-size: .85rem; }
  .back-link:hover { color: #FFD700; }
  .file-info-bar {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(100,180,255,0.15);
    border-radius: 8px;
    padding: .5rem 1rem;
    font-size: .82rem;
    color: #a8d8f0;
    margin-bottom: 1.25rem;
  }
</style>
</head>
<body>
<div class="choose-card">

  <div class="text-center mb-3">
    <div class="brand-title">Merchant Services</div>
    <div style="color:#a8d8f0;font-size:.85rem;margin-top:.2rem;">Digital Platform — Analytics Selection</div>
  </div>

  <div class="alert alert-success py-2 mb-3">
    <i class="bi bi-check-circle me-1"></i>
    <strong>Files validated successfully!</strong>
    &nbsp;Both ZWG and USD transaction files are ready.
  </div>

  <div class="row g-4">

    <div class="col-md-6">
      <a href="{% url 'select_sheet' %}" class="option-card">
        <div class="icon"><i class="bi bi-bar-chart-line-fill"></i></div>
        <span class="badge-tag"><i class="bi bi-calendar-day me-1"></i>Single Month</span>
        <h4>Daily Performance Analytics</h4>
        <div class="mt-3" style="color:#FFD700;font-size:.85rem;font-weight:600;">
          <i class="bi bi-arrow-right-circle me-1"></i> Select sheets &amp; proceed
        </div>
      </a>
    </div>

    <div class="col-md-6">
      <a href="{% url 'periodic_analytics' %}" class="option-card">
        <div class="icon"><i class="bi bi-calendar-range-fill"></i></div>
        <span class="badge-tag"><i class="bi bi-stack me-1"></i>All Worksheets</span>
        <h4>Periodic Data Analytics</h4>
        <div class="mt-3" style="color:#FFD700;font-size:.85rem;font-weight:600;">
          <i class="bi bi-arrow-right-circle me-1"></i> Load all sheets &amp; proceed
        </div>
      </a>
    </div>

  </div>

  <div class="text-center mt-4">
    <a href="{% url 'upload' %}" class="back-link">
      <i class="bi bi-arrow-left"></i> Back to upload
    </a>
  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
